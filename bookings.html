<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Edge - Bookings</title>
    <link rel="icon", href="./Assets/title-icon.png", type="image/x-icon">
    <link rel="stylesheet" href="style.css">    
</head>
<body>
    <header>
        <nav>
            <a href="./index.html"><strong>Elite Edge Gym</strong></a>
            <a href="./index.html">Home</a>
            <a href="./bookings.html">Bookings</a>
            <a href="./contact.html">Contacts</a>
        </nav>
    </header><hr>
    <main>
        <section>
            <h1>Book a Class</h1>
            <form id="booking-form">
                <label for="username">Your name</label>
                <input id="username" name="username" type="text" required>

                <label for="class-select">Choose a class</label>
                <select id="class-select" name="class_id" required></select>

                <button type="submit">Book now</button>
                <p id="feedback-banner" aria-live="polite"></p>
            </form>

            <h2>Available Classes</h2>
            <ul id="class-container">
                <li>Loading classes...</li>
            </ul>
        </section>
    </main>
    <script>
        window.API_BASE_URL = window.API_BASE_URL || "http://127.0.0.1:5500";
    </script>
    <script src="./script.js"></script><hr>
    <footer>
        <p>&copy; 2026 Elite Edge Gym. All rights reserved.</p>
    </footer>


</body>


</html>
